---
- name: Install Docker and Docker Compose on Debian
  hosts: all
  become: true

  vars:
    docker_gpg_key_url: "https://download.docker.com/linux/debian/gpg"
    docker_gpg_key_path: "/etc/apt/keyrings/docker.gpg"
    docker_repo: "https://download.docker.com/linux/debian"
    app_dir: /opt
    local_repo_path: ./services
    app_dir_final: /opt/services

  tasks:
    - name: Install required packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - make
        state: present
        update_cache: true

    - name: Create /etc/apt/keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key (dearmored)
      get_url:
        url: "{{ docker_gpg_key_url }}"
        dest: /tmp/docker.gpg
        mode: "0644"

    - name: Dearmor Docker GPG key into keyrings
      command: >
        gpg --dearmor -o {{ docker_gpg_key_path }} /tmp/docker.gpg
      args:
        creates: "{{ docker_gpg_key_path }}"

    - name: Set correct permissions on keyring
      file:
        path: "{{ docker_gpg_key_path }}"
        mode: "0644"

    - name: Add Docker APT repository
      apt_repository:
        repo: >
          deb [arch=amd64 signed-by={{ docker_gpg_key_path }}]
          {{ docker_repo }} {{ ansible_distribution_release }} stable
        state: present
        filename: docker

    - name: Update apt cache
      apt:
        update_cache: true

    - name: Install Docker Engine and Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure Docker service is enabled and started
      service:
        name: docker
        state: started
        enabled: true

    - name: Add current user to docker group (optional)
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Copy project to remote server
      copy:
        src: "{{ local_repo_path }}"
        dest: "{{ app_dir }}"

    - name: Run docker compose down
      command: docker compose -f docker-compose.prod.yml down
      args:
        chdir: "{{ app_dir_final }}"

    - name: Run docker compose up
      command: docker compose -f docker-compose.prod.yml up --build -d
      args:
        chdir: "{{ app_dir_final }}"
